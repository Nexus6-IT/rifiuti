# ============================================================================
# WasteFlow — Build immagini + Deploy (Gitea Actions, runner self-hosted)
# ----------------------------------------------------------------------------
# - push su `develop`/`master`: builda e pusha backend+frontend sul Gitea CR.
# - push su `master`: dopo la build, deploya in PRODUZIONE su Contabo
#   (/opt/rifiuti/, frontend su 127.0.0.1:3017, nginx di sistema fa TLS).
#
# Adattamenti Gitea (vedi note infra): provenance:false, cache su registry
# (no type=gha), login al Gitea CR con secret CR_TOKEN. Niente chaining
# workflow_run: build e deploy sono job dello stesso workflow legati da needs.
# ============================================================================

name: Deploy

on:
  push:
    branches: [develop, master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: gitea.tail8be933.ts.net/graziano
  BACKEND_IMAGE: gitea.tail8be933.ts.net/graziano/rifiuti-backend
  FRONTEND_IMAGE: gitea.tail8be933.ts.net/graziano/rifiuti-frontend

jobs:
  # ==========================================================================
  # QUALITY GATE — lint + test + build (blocca il deploy se fallisce)
  # ==========================================================================
  quality:
    name: Quality gate (lint, test, build)
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      # Installa dipendenze del monorepo (root + workspaces).
      - name: Install dipendenze (monorepo)
        run: npm ci

      # Prisma client necessario prima di lint/test/build.
      - name: Prisma generate
        working-directory: apps/backend
        run: npm run prisma:generate

      # Lint backend — solo errori bloccano (--max-warnings=-1):
      # i warning esistenti (no-explicit-any) sono attesi.
      - name: Lint backend
        run: npx eslint "apps/backend/{src,test}/**/*.ts" --max-warnings=-1

      # Lint frontend — idem.
      - name: Lint frontend
        run: npx eslint "apps/frontend/src/**/*.ts" --max-warnings=-1

      # Test unitari backend.
      - name: Test backend (Jest)
        working-directory: apps/backend
        run: npx jest --passWithNoTests --testPathPattern="src"

      # Build backend (stesso percorso usato dal Dockerfile.prod).
      - name: Build backend (nest build)
        working-directory: apps/backend
        run: npm run build

  # ==========================================================================
  # BUILD & PUSH immagini sul Gitea Container Registry
  # ==========================================================================
  build:
    name: Build & push immagini
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tag immagine (sha breve)
        id: meta
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: gitea.tail8be933.ts.net
          username: Graziano
          password: ${{ secrets.CR_TOKEN }}

      # Build & push con RETRY: il push sul Gitea CR (via Funnel) fallisce a
      # intermittenza ("failed to push ... unknown"). Riproviamo fino a 3 volte;
      # la cache di layer rende i retry rapidi. context backend = ./apps/backend,
      # frontend = root del monorepo (il frontend non ha lockfile proprio).
      - name: Build & push BACKEND (retry)
        run: |
          n=0
          until [ $n -ge 3 ]; do
            docker buildx build --provenance=false \
              -t "${BACKEND_IMAGE}:latest" \
              -t "${BACKEND_IMAGE}:${{ steps.meta.outputs.tag }}" \
              -f ./apps/backend/Dockerfile.prod --push ./apps/backend && exit 0
            n=$((n+1)); echo "::warning::push BACKEND fallito (tentativo $n), riprovo tra 10s"; sleep 10
          done
          echo "::error::push BACKEND fallito dopo 3 tentativi"; exit 1

      - name: Build & push FRONTEND (retry)
        run: |
          n=0
          until [ $n -ge 3 ]; do
            docker buildx build --provenance=false \
              -t "${FRONTEND_IMAGE}:latest" \
              -t "${FRONTEND_IMAGE}:${{ steps.meta.outputs.tag }}" \
              -f ./apps/frontend/Dockerfile.prod --push . && exit 0
            n=$((n+1)); echo "::warning::push FRONTEND fallito (tentativo $n), riprovo tra 10s"; sleep 10
          done
          echo "::error::push FRONTEND fallito dopo 3 tentativi"; exit 1

    outputs:
      tag: ${{ steps.meta.outputs.tag }}

  # ==========================================================================
  # DEPLOY in produzione (solo master) su Contabo
  # ==========================================================================
  deploy:
    name: Deploy produzione (Contabo)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_TAG,CR_TOKEN
          script_stop: true
          script: |
            set -e
            export DEPLOY_TAG="${{ needs.build.outputs.tag }}"
            cd /opt/rifiuti/site
            git fetch --all --prune
            git checkout master
            git reset --hard origin/master
            echo "$CR_TOKEN" | docker login gitea.tail8be933.ts.net -u Graziano --password-stdin
            export TAG="$DEPLOY_TAG"
            COMPOSE="docker compose -p rifiuti --env-file /opt/rifiuti/.env -f docker-compose.prod.yml"
            $COMPOSE pull
            # Migrazioni Prisma (forward-only) prima di avviare la nuova versione
            $COMPOSE run --rm backend npx prisma migrate deploy
            $COMPOSE up -d
            # Smoke test: il frontend risponde sul loopback
            sleep 12
            curl -fsS http://127.0.0.1:3017/ >/dev/null && echo "Deploy OK (tag $DEPLOY_TAG)"
        env:
          DEPLOY_TAG: ${{ needs.build.outputs.tag }}
          CR_TOKEN: ${{ secrets.CR_TOKEN }}

      - name: Smoke test pubblico (se PRODUCTION_URL impostata)
        if: vars.PRODUCTION_URL != ''
        run: curl -fsS "${{ vars.PRODUCTION_URL }}" >/dev/null && echo "URL pubblico OK"
