    # ===========================
    # ERROR SCHEMAS
    # ===========================

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code
          example: PERMISSION_DENIED
        message:
          type: string
          description: Human-readable error message (Italian)
          example: Non hai il permesso necessario per eseguire questa azione
        statusCode:
          type: integer
          description: HTTP status code
        details:
          type: object
          description: Additional error context
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
        path:
          type: string
          description: API endpoint that generated error
      required: [error, message, statusCode, timestamp]

    ValidationErrorDetail:
      type: object
      properties:
        field:
          type: string
          description: Field that failed validation
        message:
          type: string
          description: Validation error message
        value:
          description: Invalid value provided
        constraint:
          type: string
          description: Validation constraint violated
      required: [field, message]

  responses:
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: UNAUTHORIZED
            message: Authentication required. Please login with SPID/CIE.
            statusCode: 401
            timestamp: 2025-10-31T14:30:00.000Z
            path: /v1/roles

    ForbiddenError:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: FORBIDDEN
            message: Non hai il permesso necessario per eseguire questa azione
            statusCode: 403
            details:
              requiredPermission: roles:create
              currentRole: OPERATOR
              contactAdministrator: admin@example.com
            timestamp: 2025-10-31T14:30:00.000Z
            path: /v1/roles

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: NOT_FOUND
            message: Role non trovato
            statusCode: 404
            timestamp: 2025-10-31T14:30:00.000Z
            path: /v1/roles/123e4567-e89b-12d3-a456-426614174000

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorResponse'
              - type: object
                properties:
                  validationErrors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ValidationErrorDetail'
          example:
            error: VALIDATION_ERROR
            message: Request validation failed
            statusCode: 400
            timestamp: 2025-10-31T14:30:00.000Z
            path: /v1/roles
            validationErrors:
              - field: name
                message: Role name must be at least 3 characters
                value: ab
                constraint: minLength
              - field: permissions
                message: At least one permission is required
                constraint: minItems

    RateLimitError:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: RATE_LIMIT_EXCEEDED
            message: Too many requests. Please try again later.
            statusCode: 429
            details:
              limit: 100
              window: 60 seconds
              retryAfter: 45
            timestamp: 2025-10-31T14:30:00.000Z
      headers:
        X-RateLimit-Limit:
          description: Request limit per window
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: Requests remaining in current window
          schema:
            type: integer
        X-RateLimit-Reset:
          description: Unix timestamp when limit resets
          schema:
            type: integer
        Retry-After:
          description: Seconds until retry is allowed
          schema:
            type: integer

# ===========================
# WEBHOOKS
# ===========================

webhooks:
  permissionChanged:
    post:
      summary: Permission changed webhook
      description: |
        Triggered when user's permissions change due to:
        - Role assignment/revocation
        - Custom role modification
        - Temporary grant approval/expiration
        - Permission policy update

        Configure webhook URL in tenant settings.
        Webhook includes HMAC signature for verification.
      operationId: permissionChangedWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventId:
                  type: string
                  format: uuid
                eventType:
                  type: string
                  enum: [PERMISSION_CHANGED, ROLE_ASSIGNED, ROLE_REVOKED, TEMPORARY_GRANT_APPROVED, TEMPORARY_GRANT_EXPIRED]
                timestamp:
                  type: string
                  format: date-time
                tenantId:
                  type: string
                  format: uuid
                userId:
                  type: string
                  format: uuid
                  description: User whose permissions changed
                changedBy:
                  type: string
                  format: uuid
                  description: User who made the change
                details:
                  type: object
                  properties:
                    roleId:
                      type: string
                      format: uuid
                    roleName:
                      type: string
                    addedPermissions:
                      type: array
                      items:
                        type: string
                    removedPermissions:
                      type: array
                      items:
                        type: string
                    reason:
                      type: string
              required: [eventId, eventType, timestamp, tenantId, userId]
      responses:
        '200':
          description: Webhook received and processed
        '401':
          description: Invalid HMAC signature

  temporaryGrantExpiring:
    post:
      summary: Temporary grant expiring soon webhook
      description: |
        Triggered 30 minutes before temporary permission grant expires.
        Allows user to request extension if needed.
      operationId: temporaryGrantExpiringWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventId:
                  type: string
                  format: uuid
                eventType:
                  type: string
                  enum: [TEMPORARY_GRANT_EXPIRING]
                timestamp:
                  type: string
                  format: date-time
                tenantId:
                  type: string
                  format: uuid
                userId:
                  type: string
                  format: uuid
                grantId:
                  type: string
                  format: uuid
                permissions:
                  type: array
                  items:
                    type: string
                expiresAt:
                  type: string
                  format: date-time
                minutesRemaining:
                  type: integer
              required: [eventId, eventType, timestamp, tenantId, userId, grantId, expiresAt]
      responses:
        '200':
          description: Webhook received

  permissionRequestCreated:
    post:
      summary: Permission request created webhook
      description: |
        Triggered when user submits permission elevation request.
        Notifies administrators for approval.
      operationId: permissionRequestCreatedWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
