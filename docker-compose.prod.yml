# ============================================================================
# WasteFlow — stack di PRODUZIONE (Contabo, /opt/rifiuti/)
# ----------------------------------------------------------------------------
# Immagini buildate dalla CI Gitea e pushate sul registry Gitea CR. Qui si fa
# solo `pull` + `up`. L'HTTPS e il dominio pubblico (rifiuti.ignicraft.com) sono
# gestiti dall'nginx DI SISTEMA del VPS: il frontend espone solo 127.0.0.1:3017.
#
# SSO: l'app usa la propria auth JWT; l'integrazione come client OIDC del realm
# condiviso `ignicraft` (auth.ignicraft.com) e' un follow-up — qui NON si avvia
# un Keycloak proprio. Idem monitoring: si aggancia l'osservabilita' condivisa
# (/opt/observability/) tramite la rete esterna `monitoring`, niente
# Prometheus/Grafana propri.
#
# Lanciare SEMPRE con nome progetto esplicito per evitare collisioni con altri
# stack che vivono in sottocartella `site/`:
#   docker compose -p rifiuti --env-file /opt/rifiuti/.env \
#     -f docker-compose.prod.yml <cmd>
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-wasteflow_prod}
      POSTGRES_USER: ${DB_USER:-wasteflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD richiesta}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - wasteflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wasteflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD richiesta}
    volumes:
      - redis_data:/data
    networks:
      - wasteflow
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ${REGISTRY:-gitea.tail8be933.ts.net/graziano}/rifiuti-backend:${TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${DB_USER:-wasteflow}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-wasteflow_prod}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-wasteflow_prod}
      DB_USER: ${DB_USER:-wasteflow}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # I cache service (RoleCache/PermissionCache) leggono REDIS_CLUSTER_NODES,
      # non REDIS_HOST: va puntato al servizio redis anche in standalone.
      REDIS_CLUSTER_NODES: ${REDIS_CLUSTER_NODES:-redis:6379}
      # CORS: il callback SAML e' un POST cross-origin da Keycloak
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://rifiuti.ignicraft.com,https://auth.ignicraft.com}
      # Base URL della SPA per il redirect post-login dal callback SAML
      FRONTEND_URL: ${FRONTEND_URL:-https://rifiuti.ignicraft.com}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET richiesta}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET richiesta}
      # Cifratura a riposo dei certificati RENTRI per-tenant
      RENTRI_CREDENTIAL_ENC_KEY: ${RENTRI_CREDENTIAL_ENC_KEY:?RENTRI_CREDENTIAL_ENC_KEY richiesta}
      # Autenticazione: Keycloak come IdP SAML (realm condiviso ignicraft).
      # La SpidStrategy (passport-saml) legge le variabili SPID_*.
      KEYCLOAK_URL: ${KEYCLOAK_URL:-https://auth.ignicraft.com}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-ignicraft}
      # Service account 'rifiuti-admin' (client_credentials) per il provisioning
      # utenti su Keycloak (KeycloakUserAdapter).
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-rifiuti-admin}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      SPID_IDP_ENTRY_POINT: ${SPID_IDP_ENTRY_POINT:-https://auth.ignicraft.com/realms/ignicraft/protocol/saml}
      SPID_ENTITY_ID: ${SPID_ENTITY_ID:-rifiuti}
      SPID_CALLBACK_URL: ${SPID_CALLBACK_URL:-https://rifiuti.ignicraft.com/api/v1/auth/spid/callback}
      SPID_IDP_CERT: ${SPID_IDP_CERT}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wasteflow
      - monitoring
    volumes:
      - ./backups:/backups

  frontend:
    image: ${REGISTRY:-gitea.tail8be933.ts.net/graziano}/rifiuti-frontend:${TAG:-latest}
    restart: always
    depends_on:
      - backend
    networks:
      - wasteflow
    ports:
      # Solo loopback: l'nginx di sistema fa da reverse proxy + TLS
      - "127.0.0.1:3017:80"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  wasteflow:
    driver: bridge
  # Rete dell'osservabilita' condivisa (/opt/observability/), creata altrove.
  monitoring:
    external: true
