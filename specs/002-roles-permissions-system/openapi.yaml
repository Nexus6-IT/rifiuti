        permissions:
          type: array
          items:
            type: string
          description: Specific permissions (for temporary_elevation)
        justification:
          type: string
          minLength: 10
          maxLength: 1000
        durationHours:
          type: integer
          minimum: 1
          maximum: 168
          description: For temporary elevations only
      required: [requestType, justification]

    PermissionRequestResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        userName:
          type: string
        requestType:
          type: string
          enum: [role_assignment, temporary_elevation, role_change]
        status:
          type: string
          enum: [pending, approved, denied, cancelled]
        roleId:
          type: string
          format: uuid
          nullable: true
        roleName:
          type: string
          nullable: true
        permissions:
          type: array
          items:
            type: string
        justification:
          type: string
        requestedAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        reviewedBy:
