# nginx del container frontend: serve la SPA Angular e inoltra le chiamate API
# al backend NestJS (servizio "backend" sulla rete compose interna, porta 3000).
# L'HTTPS e il dominio pubblico sono gestiti dall'nginx di sistema sul VPS.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressione asset statici
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → backend NestJS (prefix globale /api/v1 incluso lato app)
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket (Socket.IO notifiche real-time)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # Cache lunga sugli asset con hash nel nome
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback SPA: ogni rotta non-file ritorna index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
